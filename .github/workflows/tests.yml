name: E2E Tests – MediaWiki 1.39

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E (MW 1.39 / PHP bundled)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Build & start the MediaWiki 1.39 container
      # ------------------------------------------------------------------ #
      - name: Build and start MediaWiki 1.39
        run: docker compose up -d --build

      # ------------------------------------------------------------------ #
      # 3. Wait for MediaWiki to be healthy
      #    The healthcheck polls /index.php/Main_Page every 10 s (12 retries)
      # ------------------------------------------------------------------ #
      - name: Wait for MediaWiki to become healthy
        run: |
          echo "Waiting for MW container to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
                     "$(docker compose ps -q mediawiki)" 2>/dev/null || echo "starting")
            echo "  attempt $i/24 – status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "MW is healthy!"
              break
            fi
            sleep 5
          done
          # Final check
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
                   "$(docker compose ps -q mediawiki)")
          if [ "$STATUS" != "healthy" ]; then
            echo "ERROR: MW container did not become healthy in time."
            docker compose logs mediawiki
            exit 1
          fi

      # ------------------------------------------------------------------ #
      # 4. Install Node dependencies + Playwright browser
      # ------------------------------------------------------------------ #
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/package.json

      - name: Install Playwright and dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      # ------------------------------------------------------------------ #
      # 5. Run Playwright tests
      # ------------------------------------------------------------------ #
      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          MW_BASE_URL: "http://localhost:8080"
          MW_ADMIN_USER: "WikiAdmin"
          MW_ADMIN_PASS: "WikiAdmin123!"
        run: npx playwright test

      # ------------------------------------------------------------------ #
      # 6. Upload screenshots and report as artifacts
      # ------------------------------------------------------------------ #
      - name: Upload screenshots (proof of conversion)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore

      # ------------------------------------------------------------------ #
      # 7. Show container logs on failure for debugging
      # ------------------------------------------------------------------ #
      - name: Show MW container logs on failure
        if: failure()
        run: docker compose logs mediawiki
