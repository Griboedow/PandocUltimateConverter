name: Tests

on:
  push:
  pull_request:

# Restrict the default GITHUB_TOKEN to read-only for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # i18n completeness
  # ---------------------------------------------------------------------------
  i18n:
    name: i18n completeness (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, zip, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run i18n completeness test
        run: ./vendor/bin/phpunit --testsuite i18n

  # ---------------------------------------------------------------------------
  # Unit tests — PHPUnit 10/11 requires PHP >=8.1
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.1"
          - "8.2"
          - "8.3"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, zip, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite unit

  # ---------------------------------------------------------------------------
  # MediaWiki 1.39 compatibility smoke test
  #
  # MW 1.39 (LTS) uses \RequestContext (global namespace).
  # The extension uses \RequestContext after fixing the MW 1.42+ namespace alias.
  # PHP 8.1 is the highest version supported by both MW 1.39 and PHPUnit 10+.
  # ---------------------------------------------------------------------------
  mediawiki:
    name: MW ${{ matrix.mw }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # MW 1.39 is an LTS release; PHP 7.4.3–8.1 are supported.
          # PHP 7.4 is the minimum version declared in composer.json.
          - { mw: "1.39", mw_branch: "REL1_39", php: "7.4" }
          # PHP 8.1 is the highest version supported by both MW 1.39 and PHPUnit 10+.
          - { mw: "1.39", mw_branch: "REL1_39", php: "8.1" }

    steps:
      - uses: actions/checkout@v4
        with:
          path: extensions/PandocUltimateConverter

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, zip, mbstring, intl, fileinfo
          coverage: none

      - name: Clone MediaWiki ${{ matrix.mw }}
        run: |
          git clone --depth 1 \
            --branch "${{ matrix.mw_branch }}" \
            https://github.com/wikimedia/mediawiki.git mediawiki

      - name: Install MediaWiki Composer dependencies
        run: |
          cd mediawiki
          if composer install --help 2>&1 | grep -q -- '--no-audit'; then
            AUDIT_FLAG="--no-audit"
          elif composer install --help 2>&1 | grep -q -- '--no-security-blocking'; then
            AUDIT_FLAG="--no-security-blocking"
          else
            AUDIT_FLAG=""
          fi
          composer install --no-interaction --prefer-dist --no-dev $AUDIT_FLAG

      - name: Move extension into MW tree
        run: mv extensions/PandocUltimateConverter mediawiki/extensions/PandocUltimateConverter

      - name: Install extension Composer dependencies
        run: |
          cd mediawiki/extensions/PandocUltimateConverter
          # Use --no-dev: dev deps (PHPUnit 10+) require PHP >=8.1, but this job
          # also runs on PHP 7.4. Unit tests are run separately in the 'unit' job.
          composer install --no-interaction --prefer-dist --no-dev

      - name: Set up MediaWiki database (SQLite)
        run: |
          cd mediawiki
          php maintenance/install.php \
            --dbtype sqlite \
            --dbpath /tmp/mwdb \
            --server http://localhost \
            --scriptpath "" \
            --lang en \
            TestWiki admin \
            --pass adminpassword

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Enable PandocUltimateConverter in LocalSettings.php
        run: |
          echo 'wfLoadExtension("PandocUltimateConverter");' >> mediawiki/LocalSettings.php
          echo '$wgPandocUltimateConverter_PandocExecutablePath = "pandoc";' >> mediawiki/LocalSettings.php
          # Override $wgServer to match the built-in PHP server port used in the HTTP test.
          echo '$wgServer = "http://localhost:8080";' >> mediawiki/LocalSettings.php
          # Disable MW shell sandboxing so pandoc can make outgoing HTTP requests
          # (e.g. fetching the local fixture URL during the e2e test).
          echo '$wgShellRestrictionMethod = false;' >> mediawiki/LocalSettings.php

      - name: Start PHP built-in web server
        run: |
          cd mediawiki
          # PHP built-in server: serve MW from the mediawiki/ directory on port 8080.
          # Requests for index.php?title=... are handled directly by index.php.
          php -S localhost:8080 &
          # Wait up to 15 s for the server to become reachable.
          for i in $(seq 1 15); do
            if curl -s -o /dev/null -w "%{http_code}" \
                "http://localhost:8080/index.php?title=Main_Page" | grep -qE "^[23]"; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: HTTP smoke test — special page loads and renders the conversion form
        run: |
          # Fetch Special:PandocUltimateConverter as an anonymous HTTP client.
          HTTP_STATUS=$(curl -s \
            -o /tmp/sp_response.html \
            -w "%{http_code}" \
            "http://localhost:8080/index.php?title=Special:PandocUltimateConverter")
          echo "HTTP status: ${HTTP_STATUS}"

          # The special page must return HTTP 200.
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "=== Response (first 60 lines) ==="
            head -60 /tmp/sp_response.html
            echo "FAIL: expected HTTP 200, got ${HTTP_STATUS}"
            exit 1
          fi

          # The rendered page must contain the conversion form ID.
          if ! grep -q "mw-pandoc-upload-form" /tmp/sp_response.html; then
            echo "=== Response (first 80 lines) ==="
            head -80 /tmp/sp_response.html
            echo "FAIL: form 'mw-pandoc-upload-form' not found in HTTP response"
            exit 1
          fi

          echo "SPECIAL_PAGE_HTTP_OK: form rendered correctly at HTTP 200"

      - name: Serve HTML fixture for URL-conversion e2e test
        run: |
          # Serve tests/e2e/ on port 8081 so pandoc can fetch fixture.html via HTTP.
          python3 -m http.server 8081 \
            --directory "${GITHUB_WORKSPACE}/mediawiki/extensions/PandocUltimateConverter/tests/e2e" &
          # Wait up to 15 s for the fixture server to become reachable.
          for i in $(seq 1 15); do
            if curl -s -o /dev/null -w "%{http_code}" \
                "http://localhost:8081/fixture.html" | grep -q "^200"; then
              echo "Fixture server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install Playwright Python bindings and Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Verify pandoc can fetch the fixture URL (pre-e2e sanity check)
        run: |
          # Run pandoc directly from bash to confirm it can reach localhost:8081.
          # If this step fails the e2e test would also fail, giving a clearer error.
          OUTPUT=$(pandoc --to=mediawiki --from=html "http://localhost:8081/fixture.html")
          echo "Pandoc output (first 200 chars): ${OUTPUT:0:200}"
          if echo "$OUTPUT" | grep -q "E2E Test Heading"; then
            echo "Pandoc URL conversion: OK"
          else
            echo "FAIL: expected 'E2E Test Heading' in pandoc output"
            echo "Full output: $OUTPUT"
            exit 1
          fi

      - name: E2E browser test — open special page, convert URL, validate result page
        run: |
          python3 "${GITHUB_WORKSPACE}/mediawiki/extensions/PandocUltimateConverter/tests/e2e/test_e2e_conversion.py"

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-mw${{ matrix.mw }}-php${{ matrix.php }}
          path: /tmp/e2e_*.png
          if-no-files-found: ignore

      - name: Smoke test — classes, special page, page creation
        run: |
          export MW_INSTALL_PATH="${GITHUB_WORKSPACE}/mediawiki"
          cat > /tmp/mw_smoke_test.php << 'PHPEOF'
          <?php
          /**
           * CI smoke test for PandocUltimateConverter on MediaWiki 1.39.
           *
           * Verifies:
           *   1. Extension PHP classes are autoloadable via Composer PSR-4.
           *   2. The special page is registered and instantiates without errors.
           *   3. A wiki page can be created via the MediaWiki internal API.
           *
           * MW 1.39 compatibility notes:
           *   - \RequestContext is in the global namespace (not MediaWiki\Context\RequestContext).
           *   - Maintenance::getServiceContainer() was added in MW 1.40; use
           *     MediaWikiServices::getInstance() instead.
           *   - getTitleFactory() was available from MW 1.36+, so fine for 1.39.
           */
          $IP = getenv( 'MW_INSTALL_PATH' );
          if ( !$IP ) {
              die( "MW_INSTALL_PATH not set\n" );
          }
          require_once "$IP/maintenance/Maintenance.php";

          class PandocSmokeTest extends Maintenance {
              public function __construct() {
                  parent::__construct();
                  $this->addDescription( 'CI smoke test for PandocUltimateConverter (MW 1.39)' );
              }

              public function execute() {
                  $IP = getenv( 'MW_INSTALL_PATH' );

                  // Load the extension's Composer autoloader so PSR-4 can find
                  // classes in includes/processors/ (lowercase) on case-sensitive FS.
                  $extAutoload = "$IP/extensions/PandocUltimateConverter/vendor/autoload.php";
                  if ( file_exists( $extAutoload ) ) {
                      require_once $extAutoload;
                  }

                  // Use MediaWikiServices::getInstance() — compatible with MW 1.35+.
                  // Maintenance::getServiceContainer() was only added in MW 1.40.
                  $services = \MediaWiki\MediaWikiServices::getInstance();

                  // 1. Verify extension classes are autoloadable.
                  $classes = [
                      'MediaWiki\Extension\PandocUltimateConverter\PandocWrapper',
                      'MediaWiki\Extension\PandocUltimateConverter\Processors\PandocTextPostprocessor',
                      'MediaWiki\Extension\PandocUltimateConverter\SpecialPandocUltimateConverter',
                  ];
                  foreach ( $classes as $cls ) {
                      if ( !class_exists( $cls ) ) {
                          $this->fatalError( "MISSING: $cls" );
                      }
                      $this->output( "OK: $cls\n" );
                  }

                  // 2. Verify the special page is registered and instantiates without errors.
                  $spFactory = $services->getSpecialPageFactory();
                  if ( !$spFactory->exists( 'PandocUltimateConverter' ) ) {
                      $this->fatalError( "Special page PandocUltimateConverter not registered" );
                  }
                  $sp = $spFactory->getPage( 'PandocUltimateConverter' );
                  if ( !$sp ) {
                      $this->fatalError( "Special page failed to instantiate" );
                  }
                  $this->output( "SPECIAL_PAGE_OK: " . get_class( $sp ) . "\n" );

                  // 3. Create a test page via the MediaWiki internal API.
                  //    getTitleFactory() was available from MW 1.36+, so fine for 1.39.
                  $title   = $services->getTitleFactory()->newFromText( 'CISmokeTestPage' );
                  $page    = $services->getWikiPageFactory()->newFromTitle( $title );
                  $user    = $services->getUserFactory()->newFromName( 'admin' );
                  $updater = $page->newPageUpdater( $user );
                  $updater->setContent(
                      \MediaWiki\Revision\SlotRecord::MAIN,
                      \ContentHandler::makeContent( 'Page created by CI smoke test.', $title )
                  );
                  $updater->saveRevision(
                      \CommentStoreComment::newUnsavedComment( 'CI smoke test' )
                  );
                  if ( !$updater->wasSuccessful() ) {
                      $this->fatalError( "Failed to create test page" );
                  }
                  $this->output( "PAGE_CREATED\n" );
              }
          }

          $maintClass = PandocSmokeTest::class;
          require_once RUN_MAINTENANCE_IF_MAIN;
          PHPEOF
          php /tmp/mw_smoke_test.php
